# =============================================================================
# DOCKER-COMPOSE - Local development setup with PostgreSQL
# =============================================================================
# Purpose: Easy local development with database
# Usage:
#   docker-compose up -d      (Start)
#   docker-compose down       (Stop)
#   docker-compose logs -f    (View logs)
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: runestate_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password  # Change in production!
      POSTGRES_DB: runestate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: runestate_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/runestate_db
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "True"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

# Docker Compose Commands:
# docker-compose up -d           → Start all services
# docker-compose down            → Stop all services
# docker-compose logs -f backend → View backend logs
# docker-compose logs -f postgres → View database logs
# docker-compose ps              → Status of services
# docker-compose exec postgres psql -U postgres →Interactive DB shell
